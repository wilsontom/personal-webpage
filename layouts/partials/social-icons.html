{{ $currentPage := . }}
{{ $icons := .Site.Params.iconOrder | default (slice "twitter" "GitHub" "Email" "Facebook" "GitLab" "Instagram" "LinkedIn" "YouTube" "Orcid") }}

<div class="social-icons">
  {{ range $icons }}
    {{ $icon := anchorize . }} 
    {{ if isset $currentPage.Site.Params $icon }}
      <a class="social-icons__icon" title="{{ . }}"
         style="background-image: https://www.wilsontom.co.uk/images/social/$icon.svg" 
         href="{{ index $currentPage.Site.Params $icon }}"
         target="_blank" rel="noopener">
      </a>
    {{ end }}
  {{ end }}   
</div>
